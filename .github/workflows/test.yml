name: CI

on:
  push:
    branches:
      - develop
    paths:
      - backend/**
      - mobile/**
      - .github/workflows/test.yml

jobs:
  test-and-sonar:
    name: Backend and Mobile Tests + SonarCloud
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            mobile/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run backend Jest with coverage
        working-directory: backend
        run: npm run test:cov -- --ci --watchAll=false

      - name: Install mobile dependencies
        working-directory: mobile
        run: npm ci

      - name: Run mobile Jest with coverage
        working-directory: mobile
        run: npm test -- --ci --coverage --watchAll=false

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.projectName=${{ vars.SONAR_PROJECT_NAME }}
            -Dsonar.projectVersion=${{ vars.SONAR_PROJECT_VERSION }}
            -Dsonar.sourceEncoding=UTF-8
            -Dsonar.sources=backend/src,mobile
            -Dsonar.exclusions=**/node_modules/**,**/coverage/**,mobile/.expo/**,mobile/android/**,mobile/ios/**
            -Dsonar.javascript.lcov.reportPaths=backend/coverage/lcov.info,mobile/coverage/lcov.info
