name: CI

on:
  push:
    branches:
      - main
    paths:
      - backend/**
      - mobile/**
      - .github/workflows/test.yml
  pull_request:
    branches:
      - main
    paths:
      - backend/**
      - mobile/**
      - .github/workflows/test.yml

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Run Jest with coverage
        run: npm run test:cov -- --ci
        working-directory: backend

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/lcov.info

  test-mobile:
    name: Mobile Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: mobile

      - name: Run Jest with coverage
        run: npm test -- --ci --coverage
        working-directory: mobile

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: mobile-coverage
          path: mobile/coverage/lcov.info

  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: [test-backend, test-mobile]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download backend coverage
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage

      - name: Download mobile coverage
        uses: actions/download-artifact@v4
        with:
          name: mobile-coverage
          path: mobile/coverage

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            mobile/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Install mobile dependencies
        run: npm ci
        working-directory: mobile

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.projectName=${{ secrets.SONAR_PROJECT_NAME }}
            -Dsonar.projectVersion=${{ secrets.SONAR_PROJECT_VERSION }}
            -Dsonar.sourceEncoding=UTF-8
            -Dsonar.sources=backend/src,mobile/app,mobile/components,mobile/hooks
            -Dsonar.tests=backend/src,mobile/test
            -Dsonar.test.inclusions=**/*.spec.ts,**/*.test.ts,**/*.test.tsx
            -Dsonar.exclusions=**/node_modules/**,**/coverage/**,mobile/.expo/**,mobile/android/**,mobile/ios/**
            -Dsonar.javascript.lcov.reportPaths=backend/coverage/lcov.info,mobile/coverage/lcov.info
